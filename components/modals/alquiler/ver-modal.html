<!-- Modal: Ver Detalles del Alquiler -->
<div class="modal-backdrop" id="modalVerAlquilerBackdrop">
  <div class="modal-dialog">
    <div class="modal-header">
      <h3>Detalles del Alquiler</h3>
      <button class="modal-close" id="btnCerrarVerAlquiler">✕</button>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        <div class="info-item">
          <label>ID Alquiler</label>
          <span id="verAlquilerId" style="font-weight:600"></span>
        </div>
        <div class="info-item">
          <label>Cliente</label>
          <span id="verAlquilerCliente" style="font-weight:600"></span>
        </div>
        <div class="info-item">
          <label>Identificación</label>
          <span id="verAlquilerIdentificacion"></span>
        </div>
        <div class="info-item">
          <label>Teléfono</label>
          <span id="verAlquilerTelefono"></span>
        </div>
        <div class="info-item">
          <label>Email</label>
          <span id="verAlquilerEmail"></span>
        </div>
        <div class="info-item">
          <label>Maquinaria</label>
          <span id="verAlquilerMaquinaria" style="font-weight:600"></span>
        </div>
        <div class="info-item">
          <label>Tarifa Diaria</label>
          <span id="verAlquilerTarifa"></span>
        </div>
        <div class="info-item">
          <label>Fecha Inicio</label>
          <span id="verAlquilerFechaInicio"></span>
        </div>
        <div class="info-item">
          <label>Fecha Fin</label>
          <span id="verAlquilerFechaFin"></span>
        </div>
        <div class="info-item">
          <label>Monto Total</label>
          <span id="verAlquilerMonto" style="font-weight:600; color:var(--orange)"></span>
        </div>
        <div class="info-item">
          <label>Estado</label>
          <span id="verAlquilerEstado"></span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-ghost" id="btnCerrarVerAlquiler2">Cerrar</button>
    </div>
  </div>
</div>
