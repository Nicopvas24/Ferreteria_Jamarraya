<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión – Ferretería Jamarraya</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../components/header.css"/>
  <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>
  <div id="navbar"></div>

  <main class="login-main">
    <div class="login-card">
      <h2>Iniciar <span>Sesión</span></h2>
      <p class="login-sub">Accede a tu cuenta para continuar</p>

      <div class="login-error" id="loginError"></div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="correo@ejemplo.com"/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>

      <button class="btn btn--primary btn--full" id="btnLoginSubmit">
        Ingresar
      </button>

      <p class="login-switch">
        ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
      </p>
    </div>
  </main>

  <div id="footer"></div>
  <script src="../assets/js/include.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
