<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos – Ferretería Jamarraya</title>
  <link rel="stylesheet" href="../assets/css/productos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="navbar"></div>

  <div id="prod-page">

    <!-- ── HERO BANNER ── -->
    <div class="pp-hero">
      <div class="pp-hero-bg"></div>
      <div class="pp-container">
        <span class="pp-badge">Catálogo completo</span>
        <h1>Nuestros <em>Productos</em></h1>
        <p>+5.000 referencias en herramientas, materiales y equipos.</p>
      </div>
    </div>

    <!-- ── LAYOUT PRINCIPAL ── -->
    <div class="pp-container pp-layout">

      <!-- ── SIDEBAR FILTROS ── -->
      <aside class="pp-sidebar" id="pp-sidebar">
        <div class="pp-sidebar-header">
          <span class="pp-sidebar-title">Filtros</span>
          <button class="pp-clear-filters" id="pp-clear">Limpiar</button>
        </div>

        <!-- Categorías -->
        <div class="pp-filter-group">
          <p class="pp-filter-label">Categoría</p>
          <ul class="pp-cat-list" id="pp-cat-list">
            <li><button class="pp-cat-btn active" data-cat="todos">Todos</button></li>
            <li><button class="pp-cat-btn" data-cat="herramientas_electricas">Herramientas Eléctricas</button></li>
            <li><button class="pp-cat-btn" data-cat="herramientas_manuales">Herramientas Manuales</button></li>
            <li><button class="pp-cat-btn" data-cat="materiales">Materiales</button></li>
            <li><button class="pp-cat-btn" data-cat="plomeria">Plomería</button></li>
            <li><button class="pp-cat-btn" data-cat="electricidad">Electricidad</button></li>
            <li><button class="pp-cat-btn" data-cat="pintura">Pintura</button></li>
            <li><button class="pp-cat-btn" data-cat="seguridad">Seguridad</button></li>
          </ul>
        </div>

        <!-- Precio -->
        <div class="pp-filter-group">
          <p class="pp-filter-label">Precio máximo</p>
          <input type="range" id="pp-price-range" min="0" max="2000000" value="2000000" step="10000" class="pp-range" />
          <div class="pp-price-display">
            <span>$0</span>
            <span id="pp-price-val">$2.000.000</span>
          </div>
        </div>

        <!-- Disponibilidad -->
        <div class="pp-filter-group">
          <p class="pp-filter-label">Disponibilidad</p>
          <label class="pp-check-label">
            <input type="checkbox" id="pp-in-stock" checked class="pp-check" />
            <span class="pp-checkmark"></span>
            Solo en stock
          </label>
        </div>

        <!-- Badges -->
        <div class="pp-filter-group">
          <p class="pp-filter-label">Etiqueta</p>
          <div class="pp-badge-filters">
            <button class="pp-badge-btn" data-badge="nuevo">Nuevo</button>
            <button class="pp-badge-btn" data-badge="oferta">Oferta</button>
            <button class="pp-badge-btn" data-badge="destacado">Destacado</button>
          </div>
        </div>
      </aside>

      <!-- ── CONTENIDO DERECHO ── -->
      <div class="pp-content">

        <!-- Barra superior -->
        <div class="pp-topbar">
          <div class="pp-results-info">
            <span id="pp-count">24 productos</span>
          </div>
          <div class="pp-topbar-right">
            <!-- Ordenar -->
            <select class="pp-sort" id="pp-sort">
              <option value="default">Recomendados</option>
              <option value="price-asc">Menor precio</option>
              <option value="price-desc">Mayor precio</option>
              <option value="name-asc">A → Z</option>
            </select>
            <!-- Vista -->
            <div class="pp-view-toggle">
              <button class="pp-view-btn active" id="btn-grid" title="Vista grilla">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              </button>
              <button class="pp-view-btn" id="btn-list" title="Vista lista">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>
            </div>
            <!-- Filtros móvil -->
            <button class="pp-filter-toggle" id="pp-filter-toggle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              Filtros
            </button>
          </div>
        </div>

        <!-- Grilla de productos -->
        <div class="pp-grid" id="pp-grid">
          <!-- Las tarjetas se generan desde productos.js -->
        </div>

        <!-- Paginación -->
        <div class="pp-pagination" id="pp-pagination">
          <button class="pp-page-btn" id="pp-prev" disabled>← Anterior</button>
          <div class="pp-pages" id="pp-pages"></div>
          <button class="pp-page-btn" id="pp-next">Siguiente →</button>
        </div>

      </div>
    </div>

    <!-- ── MODAL DETALLE ── -->
    <div class="pp-modal-overlay" id="pp-modal" aria-hidden="true">
      <div class="pp-modal">
        <button class="pp-modal-close" id="pp-modal-close">✕</button>
        <div class="pp-modal-img-wrap">
          <img src="" alt="" id="pp-modal-img" />
          <span class="pp-modal-badge-tag" id="pp-modal-badge"></span>
        </div>
        <div class="pp-modal-info">
          <span class="pp-modal-cat" id="pp-modal-cat"></span>
          <h2 id="pp-modal-name"></h2>
          <p class="pp-modal-brand" id="pp-modal-brand"></p>
          <p class="pp-modal-desc" id="pp-modal-desc"></p>
          <div class="pp-modal-price-row">
            <span class="pp-modal-price" id="pp-modal-price"></span>
            <span class="pp-modal-stock" id="pp-modal-stock"></span>
          </div>
          <div class="pp-modal-actions">
            <div class="pp-qty-wrap">
              <button class="pp-qty-btn" id="pp-qty-minus">−</button>
              <span class="pp-qty-val" id="pp-qty-val">1</span>
              <button class="pp-qty-btn" id="pp-qty-plus">+</button>
            </div>
            <button class="pp-add-cart-big" id="pp-modal-add-cart">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── CARRITO FLOTANTE ── -->
    <button class="pp-cart-fab" id="pp-cart-fab" aria-label="Ver carrito">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="pp-cart-count" id="pp-cart-count">0</span>
    </button>

    <!-- Panel carrito -->
    <div class="pp-cart-panel" id="pp-cart-panel" aria-hidden="true">
      <div class="pp-cart-header">
        <h3>Carrito de cotización</h3>
        <button class="pp-cart-close" id="pp-cart-close">✕</button>
      </div>
      <div class="pp-cart-items" id="pp-cart-items">
        <p class="pp-cart-empty">Tu carrito está vacío.</p>
      </div>
      <div class="pp-cart-footer">
        <div class="pp-cart-total-row">
          <span>Total estimado</span>
          <strong id="pp-cart-total">$0</strong>
        </div>
        <button class="pp-cart-cta" id="pp-cart-cta">Solicitar cotización</button>
      </div>
    </div>
    <div class="pp-cart-overlay" id="pp-cart-overlay"></div>

  </div><!-- /#prod-page -->

  <div id="footer"></div>
  <script src="../assets/js/include.js"></script>
  <script src="../assets/js/productos.js"></script>
</body>
</html>
