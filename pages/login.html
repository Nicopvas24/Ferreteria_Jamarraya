<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería Jamarraya — Iniciar sesión</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f4f4;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #c0392b;
            margin: 0;
        }
        .login-logo p {
            color: #666;
            font-size: 0.9rem;
            margin: 0.3rem 0 0;
        }
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 7px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #c0392b;
        }
        .btn-login {
            width: 100%;
            padding: 0.7rem;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #a93226;
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .mensaje-error {
            color: #c0392b;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.8rem;
            min-height: 1.2em;
        }
        .link-tienda {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: #666;
        }
        .link-tienda a {
            color: #c0392b;
            text-decoration: none;
            font-weight: 600;
        }
        .link-tienda a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <h1>Ferretería Jamarraya</h1>
        <p>Apía, Risaralda</p>
    </div>

    <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email">
    </div>

    <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login" onclick="iniciarSesion()">Ingresar</button>

    <p class="mensaje-error" id="msg-error"></p>

    <div class="link-tienda">
        ¿Eres cliente? <a href="tienda.html">Ver tienda</a>
    </div>
</div>

<script>
    // Permitir enviar con Enter
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') iniciarSesion();
    });

    // Si ya hay sesión activa, redirigir directo al dashboard
    fetch('../backend/usuarios.php?accion=verificar')
        .then(r => r.json())
        .then(data => {
            if (data.ok) redirigirSegunRol(data.rol);
        });

    function iniciarSesion() {
        const email      = document.getElementById('email').value.trim();
        const contrasena = document.getElementById('contrasena').value;
        const btn        = document.getElementById('btn-login');
        const msg        = document.getElementById('msg-error');

        msg.textContent = '';

        if (!email || !contrasena) {
            msg.textContent = 'Por favor completa todos los campos.';
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Ingresando...';

        const datos = new FormData();
        datos.append('accion',     'login');
        datos.append('email',      email);
        datos.append('contrasena', contrasena);

        fetch('../backend/usuarios.php', { method: 'POST', body: datos })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    redirigirSegunRol(data.rol);
                } else {
                    msg.textContent = data.mensaje;
                    btn.disabled    = false;
                    btn.textContent = 'Ingresar';
                }
            })
            .catch(() => {
                msg.textContent = 'Error de conexión. Intenta de nuevo.';
                btn.disabled    = false;
                btn.textContent = 'Ingresar';
            });
    }

    function redirigirSegunRol(rol) {
        if (rol === 'cliente') {
            window.location.href = 'tienda.html';
        } else {
            // admin y empleado van al dashboard
            window.location.href = 'index.html';
        }
    }
</script>

</body>
</html>
