<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Perfil — Ferreteria Jamarraya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/header.css" />
  <link rel="stylesheet" href="../assets/css/perfil.css" />
</head>
<body>

  <div id="navbar"></div>

  <div id="perfil-page">

    <!-- ── HERO ── -->
    <div class="pf-hero">
      <div class="pf-hero-bg"></div>
      <div class="pf-container">
        <span class="pf-badge">Cuenta</span>
        <h1>Mi <em>Perfil</em></h1>
        <p>Consulta y actualiza tus datos de contacto.</p>
      </div>
    </div>

    <div class="pf-container pf-layout">

      <!-- ── SIDEBAR USUARIO ── -->
      <aside class="pf-sidebar">
        <div class="pf-avatar">
          <span id="pf-avatar-letra">?</span>
        </div>
        <h3 id="pf-sidebar-nombre">Cargando...</h3>
        <span class="pf-rol-badge" id="pf-rol-badge">—</span>

        <nav class="pf-nav">
          <a href="#datos-cuenta" class="pf-nav-link active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Datos de cuenta
          </a>
          <a href="#datos-contacto" class="pf-nav-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.07 10.8 19.79 19.79 0 0 1 .22 2.18 2 2 0 0 1 2.18 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L6.91 7.91a16 16 0 0 0 6.29 6.29l1.28-1.28a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            Datos de contacto
          </a>
          <a href="#mis-compras" class="pf-nav-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Mis compras
          </a>
          <a href="#" class="pf-nav-link pf-logout" id="pf-logout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Cerrar sesión
          </a>
        </nav>
      </aside>

      <!-- ── FORMULARIO ── -->
      <div class="pf-content">

        <div id="pf-alert-error"   class="pf-alert pf-alert-error"></div>
        <div id="pf-alert-success" class="pf-alert pf-alert-success"></div>

        <form id="pf-form" novalidate>

          <!-- Datos cuenta (solo lectura) -->
          <div class="pf-card" id="datos-cuenta">
            <div class="pf-card-header">
              <span class="pf-section-label">01 / Datos de cuenta</span>
              <span class="pf-readonly-tag">Solo lectura</span>
            </div>
            <div class="pf-grid-2">
              <div class="pf-field pf-readonly">
                <label>Nombre completo</label>
                <input type="text" id="per_nombre" readonly placeholder="—" />
              </div>
              <div class="pf-field pf-readonly">
                <label>Correo electrónico</label>
                <input type="email" id="per_email" readonly placeholder="—" />
              </div>
              <div class="pf-field pf-readonly">
                <label>Identificación (Cédula / NIT)</label>
                <input type="text" id="per_identificacion" readonly placeholder="—" />
              </div>
              <div class="pf-field pf-readonly">
                <label>Rol</label>
                <input type="text" id="per_rol" readonly placeholder="—" />
              </div>
            </div>
          </div>

          <!-- Datos contacto (editables) -->
          <div class="pf-card" id="datos-contacto">
            <div class="pf-card-header">
              <span class="pf-section-label">02 / Datos de contacto</span>
              <span class="pf-editable-tag">Editable</span>
            </div>
            <div class="pf-grid-2">
              <div class="pf-field">
                <label for="per_telefono">Teléfono / WhatsApp</label>
                <input type="tel" id="per_telefono" placeholder="+57 300 000 0000" />
              </div>
              <div class="pf-field">
                <label for="per_ciudad">Ciudad</label>
                <input type="text" id="per_ciudad" placeholder="Apia, Risaralda" />
              </div>
              <div class="pf-field pf-field-full">
                <label for="per_direccion">Dirección</label>
                <textarea id="per_direccion" rows="3" placeholder="Calle 10 # 20-30"></textarea>
              </div>
            </div>
          </div>

          <!-- Acciones -->
          <div class="pf-actions" id="pf-actions-container">
            <button type="submit" class="pf-btn-primary" id="pf-submit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Guardar cambios
            </button>
            <button type="button" class="pf-btn-ghost" onclick="window.history.back()">
              Atrás
            </button>
          </div>

        </form>

        <!-- Mis Compras -->
        <div class="pf-card" id="mis-compras" style="display: none;">
          <div class="pf-card-header">
            <span class="pf-section-label">03 / Mis compras</span>
            <span class="pf-editable-tag">Historial</span>
          </div>
          <div id="pf-compras-container">
            <p style="text-align: center; color: var(--text-muted);">Cargando tu historial de compras...</p>
          </div>
        </div>

      </div>

    </div>
  </div><!-- /#perfil-page -->

  <!-- Modal Detalles de Compra -->
  <div id="pf-modal-detalle" class="pf-modal">
    <div class="pf-modal-content">
      <div class="pf-modal-header">
        <h3 id="pf-modal-title">Detalle de Compra</h3>
        <button type="button" class="pf-modal-close" id="pf-modal-close">&times;</button>
      </div>
      <div class="pf-modal-body" id="pf-modal-body">
        <!-- Contenido dinámico -->
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/include.js"></script>
  <script src="../assets/js/perfil.js"></script>
</body>
</html>
